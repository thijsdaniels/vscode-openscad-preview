name: Publish Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  publish:
    name: Publish Release
    # Run only if the PR was merged AND the source branch was exactly the Changeset action branch
    if: github.event.pull_request.merged == true && github.head_ref == 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # We need to checkout the newly merged commit on main
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Publish to Marketplaces
        run: |
          npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
          npx ovsx publish -p ${{ secrets.OVSX_PAT }}
